name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Smoke-test distribution engine
        run: python skills/distribution-engine/scripts/engine.py run skills/distribution-engine/examples/sample-pillar.md --signup-url https://example.com/signup --out "$RUNNER_TEMP/ci"
